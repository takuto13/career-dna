<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>おすすめの求人・転職サービス | キャリアDNA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="page-jobs">
  <main class="jobs-page">
    <section class="jobs-hero">
      <h1 id="page-title">戦略家タイプに合う転職サービス</h1>
      <p class="jobs-subcopy">あなたの強みを活かせるサービスをまとめました</p>
      <a class="back-link" href="javascript:history.back()">← 診断結果に戻る</a>
    </section>
    <div class="pr-notice">
      <span class="pr-badge">PR</span>
      本ページには広告・プロモーションが含まれています
    </div>

    <div id="ad-container" class="ad-container"></div>
  </main>
  <button type="button" id="scroll-top-btn" class="scroll-top-btn" aria-label="ページ上部へ戻る"></button>

  <script src="affiliate-config.js"></script>
  <script>
    // URLパラメータからタイプ名を取得
    const urlParams =
      new URLSearchParams(window.location.search);
    const typeName =
      urlParams.get('type') || '戦略家タイプ';

    // タイプのキーワードでマッチング
    const typeKey = Object.keys(TYPE_AD_CONFIG)
      .find(k => typeName.includes(k)) || '戦略';
    const config = TYPE_AD_CONFIG[typeKey];

    // ページタイトル更新
    document.title =
      typeName + 'におすすめの求人・転職サービス | キャリアDNA';
    document.getElementById('page-title').textContent =
      config.label;
    // バッジカラーマップ
    const badgeColors = {
      gold: { bg: '#fef3c7', color: '#92400e',
              border: '#fde68a' },
      purple: { bg: '#f3f0ff', color: '#5b21b6',
                border: '#c4b5fd' },
      green: { bg: '#f0fdf4', color: '#15803d',
               border: '#bbf7d0' },
      blue: { bg: '#eff6ff', color: '#1d4ed8',
              border: '#bfdbfe' },
      teal: { bg: '#f0fdfa', color: '#0f766e',
              border: '#99f6e4' }
    };

    // 広告カードをレンダリング
    const container =
      document.getElementById('ad-container');
    container.innerHTML = config.cards.map(card => {
      const bc = badgeColors[card.badgeColor] ||
        badgeColors.blue;
      return `
        <div class="ad-card">
          <div class="ad-card-header">
            <span class="card-pr-badge">PR</span>
            <span class="ad-target-badge"
              style="background:${bc.bg};
                     color:${bc.color};
                     border-color:${bc.border}">
              ${card.badge}
            </span>
          </div>
          <h3 class="ad-card-title">
            ${card.title}
          </h3>
          <p class="ad-card-desc">${card.desc}</p>
          <ul class="ad-card-points">
            ${card.points.map(p =>
              `<li>${p}</li>`).join('')}
          </ul>
          <div class="ad-warning">
            ${card.target}
          </div>
          <div class="ad-text-link">
            ${card.text}
          </div>
          <div class="ad-banner-wrap">
            ${card.banner}
          </div>
        </div>
      `;
    }).join('');

    const scrollTopBtn = document.getElementById('scroll-top-btn');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 360) {
        scrollTopBtn.classList.add('is-visible');
      } else {
        scrollTopBtn.classList.remove('is-visible');
      }
    });
    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
