        <a href="./index.html" class="hero-cta footer-cta-btn">無料で診断スタート →</a>
        <div class="footer-socials" aria-label="SNSリンク">

  <button type="button" id="scroll-top-btn" class="scroll-top-btn" aria-label="ページ上部へ戻る"></button>

  <script src="./social-share.js"></script>
  <script src="affiliate-config.js"></script>
  <script>
    // URLパラメータからタイプ名を取得
    const urlParams =
      new URLSearchParams(window.location.search);
    const typeName =
      urlParams.get('type') || '戦略家タイプ';

    // タイプのキーワードでマッチング
    const typeKey = Object.keys(TYPE_AD_CONFIG)
      .find(k => typeName.includes(k)) || '戦略';
    const config = TYPE_AD_CONFIG[typeKey];

    // ページタイトル更新
    document.title =
      typeName + 'におすすめの求人・転職サービス | キャリアDNA';
    document.getElementById('page-title').textContent =
      config.label;
    // バッジカラーマップ
    const badgeColors = {
      gold: { bg: '#fef3c7', color: '#92400e',
              border: '#fde68a' },
      purple: { bg: '#f3f0ff', color: '#5b21b6',
                border: '#c4b5fd' },
      green: { bg: '#f0fdf4', color: '#15803d',
               border: '#bbf7d0' },
      blue: { bg: '#eff6ff', color: '#1d4ed8',
              border: '#bfdbfe' },
      teal: { bg: '#f0fdfa', color: '#0f766e',
              border: '#99f6e4' }
    };

    // 広告カードをレンダリング
    const container =
      document.getElementById('ad-container');
    container.innerHTML = config.cards.map(card => {
      const bc = badgeColors[card.badgeColor] ||
        badgeColors.blue;
      return `
        <div class="ad-card">
          <div class="ad-card-header">
            <span class="card-pr-badge">PR</span>
            <span class="ad-target-badge"
              style="background:${bc.bg};
                     color:${bc.color};
                     border-color:${bc.border}">
              ${card.badge}
            </span>
          </div>
          <h3 class="ad-card-title">
            ${card.title}
          </h3>
          <p class="ad-card-desc">${card.desc}</p>
          <ul class="ad-card-points">
            ${card.points.map(p =>
              `<li>${p}</li>`).join('')}
          </ul>
          <div class="ad-warning">
            ${card.target}
          </div>
          <div class="ad-text-link">
            ${card.text}
          </div>
          <div class="ad-banner-wrap">
            ${card.banner}
          </div>
        </div>
      `;
    }).join('');

    const scrollTopBtn = document.getElementById('scroll-top-btn');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 360) {
        scrollTopBtn.classList.add('is-visible');
      } else {
        scrollTopBtn.classList.remove('is-visible');
      }
    });
    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
